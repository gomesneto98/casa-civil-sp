databases:
  - name: cig-db
    plan: free
    databaseName: casacivil
    user: casacivil

services:
  # ── Backend FastAPI ──────────────────────────────────────────────────────
  - type: web
    name: cig-backend
    env: docker
    rootDir: casa-civil-sp/backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cig-db
          property: connectionString

  # ── Frontend React (site estático) ──────────────────────────────────────
  - type: web
    name: cig-frontend
    env: static
    rootDir: casa-civil-sp/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://cig-backend.onrender.com
